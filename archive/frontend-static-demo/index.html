<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tourism 3D Console</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <!-- 左侧导航栏：用于快速跳转到页面不同区域。 -->
  <aside class="sidebar" aria-label="主导航">
    <div class="brand">
      <span class="brand-mark">T</span>
      <div>
        <strong>Tourism 3D</strong>
        <span>运营管理台</span>
      </div>
    </div>
    <nav>
      <a href="#overview">总览</a>
      <a href="#destinations">目的地</a>
      <a href="#routes">路线</a>
      <a href="#booking">预订</a>
    </nav>
    <div class="api-state" id="apiState">连接后端中...</div>
  </aside>

  <!-- 主内容区域：所有业务界面都放在这里。 -->
  <main class="app-shell">
    <!-- 总览首屏：包含 3D 地球、标题、快捷按钮和统计卡片。 -->
    <section class="hero" id="overview">
      <!-- Three.js 会把 3D 地球绘制到这个 canvas 上。 -->
      <canvas id="worldCanvas" aria-label="3D 旅游地球"></canvas>

      <!-- 如果 Three.js CDN 加载失败，CSS 3D 地球会作为降级效果展示。 -->
      <div class="css-world" aria-hidden="true">
        <span class="ring ring-a"></span>
        <span class="ring ring-b"></span>
        <span class="ring ring-c"></span>
        <span class="pin pin-a"></span>
        <span class="pin pin-b"></span>
        <span class="pin pin-c"></span>
      </div>
      <div class="hero-content">
        <p class="eyebrow">Spring Boot MVC · Tourism Platform</p>
        <h1>旅游业务运营驾驶舱</h1>
        <p class="hero-copy">目的地热度、线路库存、预订收入和游客信息集中管理，前端通过 REST API 与后端完全解耦。</p>
        <div class="quick-actions">
          <a class="primary-action" href="#booking">创建预订</a>
          <a class="ghost-action" href="#routes">查看路线</a>
        </div>
      </div>

      <!-- 统计卡片由 app.js 从 /api/dashboard/stats 读取后动态渲染。 -->
      <div class="stats-grid" id="statsGrid"></div>
    </section>

    <!-- 目的地区域：展示热门目的地卡片，并支持按主题筛选。 -->
    <section class="section" id="destinations">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Destination</p>
          <h2>热门目的地</h2>
        </div>
        <select id="themeFilter" aria-label="按主题筛选">
          <option value="all">全部主题</option>
        </select>
      </div>
      <div class="destination-grid" id="destinationGrid"></div>
    </section>

    <!-- 路线区域：展示后端返回的旅游路线表格。 -->
    <section class="section" id="routes">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Routes</p>
          <h2>旅游线路</h2>
        </div>
        <input id="routeSearch" type="search" placeholder="搜索城市、导游或路线">
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>线路</th>
              <th>目的地</th>
              <th>出发</th>
              <th>天数</th>
              <th>余位</th>
              <th>价格</th>
            </tr>
          </thead>
          <tbody id="routeTable"></tbody>
        </table>
      </div>
    </section>

    <!-- 预订区域：左边提交新订单，右边展示最近订单。 -->
    <section class="section booking-layout" id="booking">
      <div>
        <p class="eyebrow">Booking</p>
        <h2>新建游客预订</h2>
        <form id="bookingForm">
          <label>
            选择路线
            <select name="routeId" id="routeSelect" required></select>
          </label>
          <label>
            游客姓名
            <input name="travelerName" required placeholder="例如：张三">
          </label>
          <label>
            手机号码
            <input name="phone" required placeholder="13800138000">
          </label>
          <label>
            出行人数
            <input name="travelers" type="number" min="1" value="1" required>
          </label>
          <button type="submit">提交预订</button>
          <p class="form-message" id="formMessage"></p>
        </form>
      </div>
      <div>
        <div class="section-heading compact">
          <div>
            <p class="eyebrow">Recent</p>
            <h2>最近预订</h2>
          </div>
        </div>
        <div class="booking-list" id="bookingList"></div>
      </div>
    </section>
  </main>

  <!-- type="module" 允许 app.js 使用 import 加载 Three.js。 -->
  <script type="module" src="./app.js"></script>
</body>
</html>
